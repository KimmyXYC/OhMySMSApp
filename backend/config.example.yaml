# ohmysmsd 配置样例（拷贝为 config.yaml 使用）

server:
  # HTTP 监听地址。默认监听全部接口 8080 端口。
  listen: "0.0.0.0:8080"
  # 静态 Web 文件目录（Vue dist），留空则不托管静态站点。
  web_root: "./web"
  # 基础路径（反向代理场景可改）。
  base_path: "/"
  # CORS 白名单。空 = 仅同源（浏览器天然放行）；
  # 支持 glob（与 WebSocket OriginPatterns 一致），例如：
  #   - "http://localhost:*"
  #   - "https://*.example.com"
  #   - "*"                    # 完全放开（受信内网 / 开发）
  # 跨源前端（Clash 风格的可配置后端地址）必须把前端 origin 加进来。
  allowed_origins: []

database:
  # SQLite 文件路径。目录不存在会自动创建。
  path: "./data/ohmysmsapp.db"

auth:
  # JWT 签名密钥（bytes，≥32）。首次启动若为空会自动生成到该文件相邻目录。
  jwt_secret: ""
  # 单用户模式的登录用户名。
  username: "admin"
  # 登录密码的 bcrypt hash；通过 `ohmysmsd hash-password` 生成。
  password_bcrypt: ""
  # Token 有效期（Go duration）。
  token_ttl: "720h"

modem:
  # 是否启用 ModemManager DBus 客户端。开发机本地调试时可关闭走 mock。
  enabled: true
  # 信号采样周期。
  signal_poll: "30s"

telegram:
  # Bot Token，从 @BotFather 获取。留空关闭 Bot 子系统。
  bot_token: ""
  # 允许使用的单个 chat_id（私聊或群组 ID）。
  chat_id: 0
  # 收到短信后是否自动推送到上述 chat。
  push_sms: true

esim:
  # lpac 可执行文件路径。
  lpac_bin: "/opt/ohmysmsapp/bin/lpac"
  # lpac 驱动 .so 目录（LIBEUICC_DRIVER_SEARCH_PATH 兜底）。
  # 默认与 lpac_bin 同目录的 lpac-drivers/；保留默认即可。
  lpac_drivers_dir: "/opt/ohmysmsapp/bin/lpac-drivers"
  # 切换 profile 期间是否对目标模块执行 ModemManager InhibitDevice。
  # 必须为 true，否则 lpac 会抢占失败。
  inhibit_modem_manager: true
  # 单次 lpac 执行的最大时长。
  operation_timeout: "30s"
  # 同一 modem 上的自动发现冷却（避免每次状态抖动都重新跑 lpac chip info）。
  discover_cooldown: "1h"
  # 已知卡商 → ISD-R AID 覆盖（留空使用 lpac 默认 AID）。
  # 实测 5ber / 9eSIM 均使用默认 AID，正常情况下保留为空。
  aids: {}

logging:
  # debug / info / warn / error
  level: "info"
  # text / json
  format: "text"
